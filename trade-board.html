<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Табло выгодного маршрута</title>
    <style>
      :root {
        --bg: #0f1a24;
        --panel: rgba(14, 29, 43, 0.78);
        --panel-solid: #132735;
        --text: #e7ecf2;
        --muted: #9fb1c3;
        --accent: #2ec4b6;
        --danger: #ff6b6b;
        --border: rgba(255, 255, 255, 0.12);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI Variable", "Trebuchet MS", "Verdana", sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at 12% -14%,
            rgba(46, 196, 182, 0.2),
            transparent 36%
          ),
          radial-gradient(
            circle at 88% -16%,
            rgba(246, 189, 96, 0.2),
            transparent 32%
          ),
          linear-gradient(180deg, #0b151e 0%, var(--bg) 65%);
        background-attachment: fixed;
      }

      .page {
        width: min(1320px, 94vw);
        margin: 28px auto 40px;
        display: grid;
        gap: 16px;
      }

      .header,
      .board {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .header {
        padding: 20px;
      }

      .title {
        margin: 0 0 6px;
        font-size: clamp(1.4rem, 2.4vw, 2rem);
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .top-nav {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .top-nav a {
        text-decoration: none;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
        padding: 7px 12px;
        font-size: 0.85rem;
        transition: 0.16s ease;
      }

      .top-nav a:hover {
        transform: translateY(-1px);
        border-color: color-mix(in srgb, var(--accent) 55%, white 20%);
      }

      .top-nav a.active {
        background: color-mix(in srgb, var(--accent) 26%, transparent);
        border-color: color-mix(in srgb, var(--accent) 72%, white 10%);
      }

      .board {
        padding: 14px;
      }

      .toolbar-row {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .span-4 {
        grid-column: span 4;
      }

      .span-2 {
        grid-column: span 2;
      }

      select {
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel-solid);
        color: var(--text);
        padding: 9px 10px;
        font: inherit;
      }

      .status {
        color: var(--muted);
        margin-top: 8px;
        font-size: 0.9rem;
      }

      .board-wrap {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: auto;
        background: rgba(255, 255, 255, 0.02);
      }

      .trade-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 820px;
        font-size: 0.9rem;
      }

      .trade-table th,
      .trade-table td {
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        text-align: left;
        vertical-align: top;
      }

      .trade-table th {
        font-size: 0.8rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
      }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 20px;
        border: 1px dashed var(--border);
        border-radius: 12px;
      }

      .note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      @media (max-width: 760px) {
        .toolbar-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .span-2,
        .span-4 {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="header">
        <h1 class="title">Табло выгодного маршрута</h1>
        <p class="subtitle">
          Выберите город отправления и назначения, чтобы получить топ товаров
          для закупки и продажи по ожидаемой прибыли.
        </p>
        <nav class="top-nav" aria-label="Разделы">
          <a href="./index.html">Корабли</a>
          <a href="./prices.html">Торговые цены</a>
          <a href="./trade-board.html" class="active">Табло маршрута</a>
          <a href="./items.html">Предметы</a>
        </nav>
      </section>

      <section class="board">
        <div class="toolbar-row">
          <div class="field span-4">
            <label for="fromCity">Текущий город</label>
            <select id="fromCity"></select>
          </div>
          <div class="field span-4">
            <label for="toCity">Целевой город</label>
            <select id="toCity"></select>
          </div>
          <div class="field span-2">
            <label for="topCount">Топ</label>
            <select id="topCount">
              <option value="5">Топ-5</option>
              <option value="10" selected>Топ-10</option>
              <option value="15">Топ-15</option>
            </select>
          </div>
        </div>

        <div id="status" class="status">Инициализация...</div>
        <div id="tradeBoard" class="board-wrap"></div>
        <div class="note">
          Расчет использует базовые цены товаров и заданные коэффициенты выгоды
          между статусами.
        </div>
      </section>
    </main>

    <script>
      const BASE_BUY_PRICES = Object.freeze({
        Золото: 255,
        Серебро: 230,
        Оружие: 120,
        Рабы: 110,
        Лекарства: 95,
        Провиант: 90,
        "Красное дерево": 62.5,
        Шелк: 62,
        Бомбы: 60,
        Сандал: 53.33,
        Кофе: 46.5,
        Одежда: 41,
        Порох: 40,
        "Черное дерево": 38,
        Табак: 32.5,
        Какао: 25,
        Вино: 22.5,
        Корица: 18.5,
        Фрукты: 16,
        Кожа: 14,
        Ром: 13,
        Хлопок: 13,
        Книппели: 13,
        Полотно: 12.5,
        Паприка: 12.5,
        Картечь: 12,
        Пшеница: 10,
        Масло: 10,
        Сахар: 9,
        Копра: 9,
        Эль: 7,
        Доски: 2.67,
        Кирпичи: 2.67,
        Парусина: 2.5,
        Ядра: 2,
      });

      const PROFITABILITY = Object.freeze({
        "Экспорт->Default": 0.257,
        "Экспорт->Импорт": 0.743,
        "Экспорт->Контрабанда": 2.538,
        "Default->Импорт": 0.202,
        "Default->Контрабанда": 1.439,
        "Импорт->Контрабанда": 0.763,
      });

      const state = {
        allCities: [],
      };

      const numberFmt = new Intl.NumberFormat("ru-RU", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2,
      });

      const elements = {
        fromCity: document.getElementById("fromCity"),
        toCity: document.getElementById("toCity"),
        topCount: document.getElementById("topCount"),
        tradeBoard: document.getElementById("tradeBoard"),
        status: document.getElementById("status"),
      };

      function statusLabel(status) {
        return status === "Default" ? "Обычная цена" : status;
      }

      function updateStatus(message, isError = false) {
        elements.status.textContent = message;
        elements.status.style.color = isError
          ? "var(--danger)"
          : "var(--muted)";
      }

      function normalizeData(data) {
        if (!Array.isArray(data)) {
          throw new Error("Ожидался JSON-массив с городами.");
        }

        state.allCities = data.map((city) => ({
          name: String(city["Город"] ?? "Без названия"),
          goods: Object.entries(city["Товары"] ?? {}).map(([name, status]) => ({
            name: String(name),
            status: String(status),
          })),
        }));
      }

      function fillRouteCityFilters() {
        const cityNames = state.allCities
          .map((city) => city.name)
          .sort((a, b) => a.localeCompare(b, "ru"));

        const prevFrom = elements.fromCity.value;
        const prevTo = elements.toCity.value;

        elements.fromCity.innerHTML = "";
        elements.toCity.innerHTML = "";

        cityNames.forEach((cityName) => {
          const fromOption = document.createElement("option");
          fromOption.value = cityName;
          fromOption.textContent = cityName;
          elements.fromCity.appendChild(fromOption);

          const toOption = document.createElement("option");
          toOption.value = cityName;
          toOption.textContent = cityName;
          elements.toCity.appendChild(toOption);
        });

        if (cityNames.includes(prevFrom)) {
          elements.fromCity.value = prevFrom;
        } else {
          elements.fromCity.value = cityNames[0] ?? "";
        }

        if (cityNames.includes(prevTo)) {
          elements.toCity.value = prevTo;
        } else {
          elements.toCity.value = cityNames[1] ?? cityNames[0] ?? "";
        }
      }

      function calculateTradeTop(fromCityName, toCityName) {
        const fromCity = state.allCities.find(
          (city) => city.name === fromCityName,
        );
        const toCity = state.allCities.find((city) => city.name === toCityName);
        if (!fromCity || !toCity) return [];

        const toGoodsMap = new Map(
          toCity.goods.map((good) => [good.name, good]),
        );

        return fromCity.goods
          .map((fromGood) => {
            const toGood = toGoodsMap.get(fromGood.name);
            if (!toGood) return null;

            const pairKey = `${fromGood.status}->${toGood.status}`;
            const roi = PROFITABILITY[pairKey];
            const basePrice = BASE_BUY_PRICES[fromGood.name];

            if (!Number.isFinite(roi) || !Number.isFinite(basePrice)) {
              return null;
            }

            return {
              name: fromGood.name,
              fromStatus: fromGood.status,
              toStatus: toGood.status,
              basePrice,
              roi,
              profitPerUnit: basePrice * roi,
            };
          })
          .filter(Boolean)
          .sort((a, b) => {
            if (b.profitPerUnit !== a.profitPerUnit)
              return b.profitPerUnit - a.profitPerUnit;
            return a.name.localeCompare(b.name, "ru");
          });
      }

      function renderTradeBoard() {
        const fromCityName = elements.fromCity.value;
        const toCityName = elements.toCity.value;
        const topLimit = Number(elements.topCount.value || 10);

        if (!fromCityName || !toCityName) {
          elements.tradeBoard.innerHTML =
            '<div class="empty">Города недоступны для расчета.</div>';
          return;
        }

        if (fromCityName === toCityName) {
          elements.tradeBoard.innerHTML =
            '<div class="empty">Выберите разные города.</div>';
          return;
        }

        const opportunities = calculateTradeTop(fromCityName, toCityName);
        if (!opportunities.length) {
          elements.tradeBoard.innerHTML =
            '<div class="empty">Нет выгодных комбинаций для выбранного маршрута.</div>';
          return;
        }

        const top = opportunities.slice(0, topLimit);
        const rows = top
          .map(
            (item, index) => `
              <tr>
                <td><strong>${index + 1}</strong></td>
                <td><strong>${escapeHtml(item.name)}</strong></td>
                <td>${escapeHtml(statusLabel(item.fromStatus))}</td>
                <td>${escapeHtml(statusLabel(item.toStatus))}</td>
                <td>${numberFmt.format(item.basePrice)}</td>
                <td>${numberFmt.format(item.roi * 100)}%</td>
                <td><strong>${numberFmt.format(item.profitPerUnit)}</strong></td>
              </tr>
            `,
          )
          .join("");

        elements.tradeBoard.innerHTML = `
          <table class="trade-table">
            <thead>
              <tr>
                <th>Топ</th>
                <th>Товар</th>
                <th>Статус в ${escapeHtml(fromCityName)}</th>
                <th>Статус в ${escapeHtml(toCityName)}</th>
                <th>Базовая цена (за 1 ц)</th>
                <th>Доходность</th>
                <th>Ожид. прибыль (за 1 ц)</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function loadPricesData() {
        updateStatus("Загрузка prices.json...");
        try {
          const response = await fetch("./prices.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          normalizeData(data);
          fillRouteCityFilters();
          renderTradeBoard();
          updateStatus(`Загружено городов: ${state.allCities.length}`);
        } catch {
          updateStatus("Не удалось загрузить prices.json.", true);
        }
      }

      elements.fromCity.addEventListener("change", renderTradeBoard);
      elements.toCity.addEventListener("change", renderTradeBoard);
      elements.topCount.addEventListener("change", renderTradeBoard);

      loadPricesData();
    </script>
  </body>
</html>
